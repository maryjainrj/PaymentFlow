 spring:
    application:
    name: payflow

 datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payflowdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin123}
 jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


 logging:
  level:
    com.payflow: DEBUG

 server:
  port: 8080
