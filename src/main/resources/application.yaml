spring:
  application:
    name: payflow

  datasource:
    url: jdbc:h2:mem:payflowdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.payflow: DEBUG

server:
  port: 8080
